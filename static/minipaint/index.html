<body>
	<div class="wrapper">

		<nav aria-label="Main Menu" class="main_menu" id="main_menu"></nav>
		
		<div class="submenu">
			<a class="logo" href="#">miniPaint</a>
			<div class="block attributes" id="action_attributes"></div>
			<button class="undo_button" id="undo_button" type="button">
				<span class="sr_only">Undo</span>
			</button>
		</div>
		
		<div class="sidebar_left" id="tools_container"></div>


		<div class="middle_area" id="middle_area">

			<canvas class="ruler_left" id="ruler_left"></canvas>
			<canvas class="ruler_top" id="ruler_top"></canvas>

			<div class="main_wrapper" id="main_wrapper">
				<div class="canvas_wrapper" id="canvas_wrapper">
					<div id="mouse"></div>
					<div class="transparent-grid" id="canvas_minipaint_background"></div>
					<canvas id="canvas_minipaint">
						<div class="trn error">
							Your browser does not support canvas or JavaScript is not enabled.
						</div>
					</canvas>
				</div>
			</div>
		</div>

		<div class="sidebar_right">
			<div class="preview block">
				<h2 class="trn toggle" data-target="toggle_preview">Preview</h2>
				<div id="toggle_preview"></div>
			</div>
			
			<div class="colors block">
				<h2 class="trn toggle" data-target="toggle_colors">Colors</h2>
				<div class="content" id="toggle_colors"></div>
			</div>
			
			<div class="block" id="info_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_info">Information</h2>
				<div class="content" id="toggle_info"></div>
			</div>
			
			<div class="details block" id="details_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_details">Layer details</h2>
				<div class="content details-content" id="toggle_details"></div>
			</div>
			
			<div class="layers block">
				<h2 class="trn">Layers</h2>
				<div class="content" id="layers_base"></div>
			</div>
		</div>
	</div>
	<div class="mobile_menu">
		<button class="left_mobile_menu" id="left_mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
		<button class="right_mobile_menu" id="mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
	</div>
	<div class="hidden" id="tmp"></div>
	<div id="popups"></div>

<script>
// ---- Right-click inpaint (Remove / Generative fill) via Flux Fill Pro ----
(function(){
  function boot() {
    var canvas = document.getElementById('canvas_minipaint');
    if (!canvas || !window.Layers || typeof window.Layers.insert !== 'function') {
      return setTimeout(boot, 100);
    }

    // Read miniPaint's live selection rect. Returns {x,y,w,h} or null.
    function getLiveRect() {
      try {
        var mod = window.AppConfig.GUI.GUI_tools.tools_modules.selection;
        if (!mod || !mod.object || !mod.object.Base_selection) return null;
        var d = mod.object.Base_selection.get_selection();
        if (!d || d.x == null || d.y == null || !d.width || !d.height) return null;
        var w = Math.round(d.width), h = Math.round(d.height);
        if (w < 4 || h < 4) return null;
        return { x: Math.round(d.x), y: Math.round(d.y), w: w, h: h };
      } catch (e) { return null; }
    }

    // Capture-phase contextmenu beats miniPaint's own preventDefault
    canvas.addEventListener('contextmenu', function(e){
      e.preventDefault();
      e.stopPropagation();
      showMenu(e.clientX, e.clientY);
    }, true);
    // Also win against the document-level handler miniPaint registers
    document.addEventListener('contextmenu', function(e){
      if (e.target === canvas || canvas.contains(e.target)) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    var menu = null;
    function killMenu(){ if (menu){ menu.remove(); menu = null; } }
    function showMenu(x, y) {
      killMenu();
      var rect = getLiveRect();
      menu = document.createElement('div');
      menu.style.cssText = 'position:fixed;left:'+x+'px;top:'+y+'px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:8px;padding:6px 0;min-width:240px;z-index:99999;font:13px -apple-system,BlinkMacSystemFont,sans-serif;color:#ddd;box-shadow:0 8px 24px rgba(0,0,0,0.5);user-select:none;';
      var header = document.createElement('div');
      header.style.cssText = 'padding:4px 14px 6px;font-size:11px;letter-spacing:1px;color:#666;border-bottom:1px solid #2a2a4a;margin-bottom:4px;';
      header.textContent = rect ? ('SELECTION  ' + rect.w + '×' + rect.h) : 'NO SELECTION';
      menu.appendChild(header);
      var items = [
        ['Remove (content-aware)', function(){ runFill('', rect); }],
        ['Generative fill…', function(){
          var p = window.prompt('What do you want to generate?', '');
          if (p && p.trim()) runFill(p.trim(), rect);
        }],
      ];
      items.forEach(function(item){
        var b = document.createElement('div');
        b.textContent = item[0];
        var disabled = !rect;
        b.style.cssText = 'padding:8px 14px;cursor:'+(disabled?'not-allowed':'pointer')+';opacity:'+(disabled?'0.4':'1')+';';
        if (!disabled) {
          b.onmouseenter = function(){ b.style.background = '#2a2a4a'; };
          b.onmouseleave = function(){ b.style.background = ''; };
          b.onclick = function(){ killMenu(); item[1](); };
        }
        menu.appendChild(b);
      });
      document.body.appendChild(menu);
      setTimeout(function(){ document.addEventListener('mousedown', dismiss, true); }, 0);
    }
    function dismiss(e){
      if (menu && !menu.contains(e.target)) {
        document.removeEventListener('mousedown', dismiss, true);
        killMenu();
      }
    }

    var statusEl = document.createElement('div');
    statusEl.style.cssText = 'position:fixed;left:50%;top:64px;transform:translateX(-50%);background:#1a1a2a;border:1px solid #2a2a4a;color:#ddd;padding:10px 18px;border-radius:8px;font:13px -apple-system,BlinkMacSystemFont,sans-serif;z-index:99998;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
    document.body.appendChild(statusEl);
    function setStatus(msg, color, autohide) {
      statusEl.textContent = msg;
      statusEl.style.color = color || '#ddd';
      statusEl.style.display = 'block';
      if (autohide) setTimeout(function(){ statusEl.style.display = 'none'; }, 3500);
    }

    function runFill(promptText, r) {
      if (!r) return;
      setStatus(promptText ? 'Generating fill…' : 'Removing…', '#f5b942', false);

      var dim;
      try { dim = window.Layers.get_dimensions(); }
      catch (e) { return setStatus('Layers unavailable', '#e07070', true); }

      var imgCanvas = document.createElement('canvas');
      imgCanvas.width = dim.width; imgCanvas.height = dim.height;
      window.Layers.convert_layers_to_canvas(imgCanvas.getContext('2d'));

      var maskCanvas = document.createElement('canvas');
      maskCanvas.width = dim.width; maskCanvas.height = dim.height;
      var mctx = maskCanvas.getContext('2d');
      mctx.fillStyle = '#000'; mctx.fillRect(0, 0, dim.width, dim.height);
      mctx.fillStyle = '#fff'; mctx.fillRect(r.x, r.y, r.w, r.h);

      Promise.all([
        new Promise(function(res){ imgCanvas.toBlob(res, 'image/png'); }),
        new Promise(function(res){ maskCanvas.toBlob(res, 'image/png'); })
      ]).then(function(blobs){
        var fd = new FormData();
        fd.append('image', blobs[0], 'image.png');
        fd.append('mask',  blobs[1], 'mask.png');
        fd.append('prompt', promptText);
        return fetch('/api/thumb-edit/inpaint', { method: 'POST', body: fd });
      }).then(function(resp){
        if (!resp.ok) {
          return resp.json().then(function(j){ throw new Error(j.error || ('HTTP '+resp.status)); },
                                  function(){ throw new Error('HTTP '+resp.status); });
        }
        return resp.blob();
      }).then(function(blob){
        var img = new Image();
        img.onload = function(){
          try {
            window.Layers.insert({
              name: promptText ? ('fill: ' + promptText.slice(0, 24)) : 'remove',
              type: 'image',
              data: img,
              width: img.naturalWidth, height: img.naturalHeight,
              width_original: img.naturalWidth, height_original: img.naturalHeight,
            });
            setStatus('Done — added as new layer', '#7ad17a', true);
          } catch (e) {
            setStatus('Layer insert failed: ' + e.message, '#e07070', true);
          }
        };
        img.onerror = function(){ setStatus('Decode failed', '#e07070', true); };
        img.src = URL.createObjectURL(blob);
      }).catch(function(err){
        setStatus('Failed: ' + err.message, '#e07070', true);
      });
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
